services:
  - type: web
    name: warranty-intelligence-backend
    env: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ALLOWED_ORIGIN
        value: https://your-frontend-domain.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        value: ""
